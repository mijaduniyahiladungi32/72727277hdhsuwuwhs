name: Auto Update Playlist (WAY2)

on:
  workflow_run:
    workflows: ["Playlistxxx"]
    types:
      - completed

  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      run: |
        python -m pip install --upgrade pip
        pip install playwright requests pytz
        playwright install chromium --with-deps

    - name: Create temp folder
      run: mkdir -p tmp_folder

    - name: Unzip code
      env:
        FILE_API: ${{ secrets.FILE_APISCHS2_WAY2 }}
      run: unzip -o -P "$FILE_API" code-1-w2.zip -d tmp_folder

    - name: Run script
      run: python3 tmp_folder/code.py

    - name: Cleanup
      if: always()
      run: rm -rf tmp_folder

    - name: Clone target repo
      run: |
        git clone https://x-access-token:${{ secrets.TARGET_TOKENCHS1 }}@${{ secrets.TARGET_URLTSCHD1 }} target_repo

    - name: Copy files
      run: cp *.m3u target_repo/ || true

    - name: Commit & push
      run: |
        cd target_repo
        git config user.name "${{ secrets.TARGET_REPO_USER }}"
        git config user.email "${{ secrets.TARGET_REPO_USER }}@users.noreply.github.com"
        git add .
        git commit -m "Auto update $(date)" || echo "No changes"
        git push
